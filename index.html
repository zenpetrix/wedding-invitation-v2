<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Undangan Pernikahan</title>

  <link rel="stylesheet" href="css/menikah.css">

  <style>

    html{
        height: 100%;
        overflow: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url("./image/2.jpeg") no-repeat;
      font-family: 'Raleway', sans-serif;
    }

    .welcome-wrapper {
      text-align: center;
      padding: 40px 24px;
      max-width: 420px;
      width: 90%;
    }

    .welcome-heading {
      font-size: 0.85rem;
      letter-spacing: 2px;
      color: #666;
      margin-bottom: 30px;
    }

    .welcome-couple {
      font-family: 'Cherry Blossom Script', cursive;
      font-size: 3rem;
      color: #000;
      margin-bottom: 32px;
    }

    .welcome-card {
      background: rgba(0,0,0,0.05);
      padding: 22px 18px;
      border-radius: 16px;
      margin-bottom: 28px;
    }

    .welcome-label {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 10px;
    }

    .welcome-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #000;
      margin-bottom: 28px;
    }

    .welcome-place {
      font-size: 0.9rem;
      color: #666;
    }

    .btn-open {
      display: inline-block;
      padding: 14px 34px;
      background: #000;
      color: #fff;
      border-radius: 30px;
      text-decoration: none;
      font-size: 0.95rem;
    }
  </style>
  <link rel="icon" type="image/png" href="image/favicon.png" />
  
   
</head>
<body>

    <!-- Begin Preloader -->
    <div class="preloader-wrapper">
      <div class="preloader">
        <img src="./image/1.jpeg" alt="Flower" />
      </div>
    </div>
    <!-- End Preloader-->

  <div class="welcome-wrapper">
    <div class="welcome-heading">THE WEDDING OF</div>
    <div class="fotobunga">
      <img src="./image/image-removebg-preview.png">
    </div>

    <div class="welcome-couple">
      Cici & Fikri
    </div>

    <div class="welcome-card">
      <div class="welcome-label">Kepada Yth.<br>Bapak/Ibu/Saudara/i </div>
      <div id="nama-tamu" class="welcome-name">
       
      </div>
      <div class="welcome-place">Di Tempat</div>
    </div>

    <a id="btnUndangan" class="btn-open">
      Open Invitation
    </a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const nama = params.get("to");

    const namaTamuEl = document.getElementById("nama-tamu");
    const btn = document.getElementById("btnUndangan");

    if (nama) {
      const namaFix = nama.replace(/\+/g, " ");
      namaTamuEl.innerText = namaFix;
      btn.href = `undangan.html?to=${encodeURIComponent(namaFix)}`;
    } else {
      btn.href = "undangan.html";
    }
  </script>

  <script>
  const btn = document.getElementById("btnUndangan");
  btn.addEventListener("click", (e) => {
    e.preventDefault(); // cegah pindah langsung
    const audio = new Audio("audio/lagu.mp3");
    audio.play().then(() => {
      // setelah musik mulai, baru pindah halaman
      window.location.href = "undangan.html";
    }).catch(err => {
      console.log("Safari blok autoplay:", err);
      window.location.href = "undangan.html";
    });
  });
</script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="js/prelo.js"></script>

</body>
</html>
